name: Auto Update Sensitive Lexicon

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: lexicon-update
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate new words
        run: node scripts/generate-words.js
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        timeout-minutes: 10

      - name: AI Review
        run: node scripts/ai-review.js
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        timeout-minutes: 15

      - name: Build index
        run: node scripts/build-index.js

      - name: Create Report
        run: |
          mkdir -p reports
          node scripts/create-report.js > "reports/update-report-$(date +%Y%m%d).md"

      - name: Check for changes
        id: changes
        run: |
          CHANGES=$(git status --porcelain)
          if [ -z "$CHANGES" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
            exit 0
          fi
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "Changes detected:"
          echo "$CHANGES"

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "AI Bot"
          git config user.email "ai-bot@example.com"
          git add .
          git commit -m "feat: auto update lexicon $(date +%Y.%m.%d)"
          git push
        continue-on-error: true

      - name: Create Release
        if: steps.changes.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v$(date +%Y.%m.%d)"
          name: "Lexicon Update $(date +%Y.%m.%d)"
          body_path: "reports/update-report-$(date +%Y%m%d).md"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
