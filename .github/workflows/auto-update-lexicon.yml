name: Auto Update Sensitive Lexicon

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: lexicon-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  auto-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm install

      - name: Generate variants (local rules)
        run: node scripts/generate-words-v2.js

      - name: AI Review
        run: node scripts/ai-review.js

      - name: Build index
        run: node scripts/build-index.js

      - name: Create report
        run: |
          mkdir -p reports
          node scripts/create-report.js > "reports/update-report-$(date +%Y%m%d).md"

      - name: Check changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes found:"
            git diff --stat
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "AI Bot"
          git config user.email "ai-bot@example.com"
          git add .
          git commit -m "feat: auto update lexicon $(date +%Y.%m.%d)"
          git push
        continue-on-error: true

      - name: Create Release
        if: steps.changes.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v$(date +%Y.%m.%d)"
          body_path: "reports/update-report-$(date +%Y%m%d).md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
