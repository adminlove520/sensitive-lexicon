name: Auto Update Sensitive Lexicon

on:
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨 2 点运行
  workflow_dispatch:      # 手动触发

jobs:
  auto-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: *** secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          npm install axios
      
      - name: Generate new words (AI)
        run: |
          node scripts/generate-words.js
        env:
          MINIMAX_API_KEY: *** secrets.MINIMAX_API_KEY }}
      
      - name: AI Review
        run: |
          node scripts/ai-review.js
        env:
          MINIMAX_API_KEY: *** secrets.MINIMAX_API_KEY }}
      
      - name: Build index
        run: |
          node scripts/build-index.js
      
      - name: Create Report
        run: |
          node scripts/create-report.js > reports/update-report-$(date +%Y%m%d).md
      
      - name: Commit and push
        run: |
          git config user.name "AI Bot"
          git config user.email "ai-bot@example.com"
          git add .
          git diff --staged --quiet || git commit -m "feat: auto update lexicon $(date +%Y.%m.%d)"
          git push
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v$(date +%Y.%m.%d)"
          name: "Lexicon Update $(date +%Y.%m.%d)"
          body_path: reports/update-report-$(date +%Y%m%d).md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: *** secrets.GITHUB_TOKEN }}
